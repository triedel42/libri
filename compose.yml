services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
        - action: sync
          path: ./frontend/src
          target: /app/frontend/src
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: frontend/package.json
