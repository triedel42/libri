name: libri

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    volumes:
      - data:/app/data
    develop:
      watch:
        - action: sync
          path: ../backend
          target: /app/backend
        - action: sync
          path: ../frontend/src
          target: /app/frontend/src
        - action: sync
          path: ../frontend/vite.config.ts
          target: /app/frontend/vite.config.ts
        - action: rebuild
          path: ../pyproject.toml
        - action: rebuild
          path: ../frontend/package.json

volumes:
  data:
